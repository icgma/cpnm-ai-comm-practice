<style>
  :root {
    --bg-primary: #0a0e1a;
    --bg-secondary: #111827;
    --bg-card: #1a2236;
    --bg-card-hover: #1f2a42;
    --border: #2a3654;
    --text-primary: #e8ecf4;
    --text-secondary: #8b97b0;
    --text-muted: #5c6a82;
    --accent-blue: #3b82f6;
    --accent-cyan: #06b6d4;
    --accent-purple: #8b5cf6;
    --accent-pink: #ec4899;
    --accent-amber: #f59e0b;
    --accent-green: #10b981;
    --accent-red: #ef4444;
    --accent-orange: #f97316;
    --glow-blue: rgba(59,130,246,0.15);
    --glow-purple: rgba(139,92,246,0.15);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Inter', 'Noto Sans SC', system-ui, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    overflow: hidden;
    height: 100vh;
  }

  /* ── Header ── */
  .header {
    position: fixed; top:0; left:0; right:0; z-index:100;
    background: linear-gradient(180deg, rgba(10,14,26,0.97) 0%, rgba(10,14,26,0.85) 100%);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-left { display:flex; align-items:center; gap:16px; }
  .header-logo {
    width:36px; height:36px; border-radius:10px;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
    display:flex; align-items:center; justify-content:center;
    font-size:18px; font-weight:700; color:#fff;
  }
  .header-title { font-size:16px; font-weight:600; letter-spacing:-0.3px; }
  .header-subtitle { font-size:12px; color:var(--text-secondary); margin-top:1px; }
  .header-right { display:flex; align-items:center; gap:10px; }

  /* ── Filter Buttons ── */
  .filter-bar {
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .filter-btn {
    padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; color: var(--text-secondary); cursor: pointer;
    font-size: 12px; font-family: inherit; transition: all 0.2s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--accent-blue); color: var(--text-primary); }
  .filter-btn.active { background: var(--accent-blue); border-color: var(--accent-blue); color: #fff; }

  .tag-filters { display:flex; gap:6px; margin-left:12px; }
  .tag-btn {
    padding: 4px 10px; border-radius: 12px; border: none;
    cursor: pointer; font-size: 12px; font-family: inherit;
    transition: all 0.2s; opacity: 0.5;
  }
  .tag-btn.active { opacity: 1; transform: scale(1.05); }
  .tag-btn.tag-key { background: rgba(239,68,68,0.2); color: #fca5a5; }
  .tag-btn.tag-diff { background: rgba(245,158,11,0.2); color: #fcd34d; }
  .tag-btn.tag-exam { background: rgba(59,130,246,0.2); color: #93c5fd; }
  .tag-btn.tag-sz { background: rgba(16,185,129,0.2); color: #6ee7b7; }

  /* ── Graph Container ── */
  #graph-container {
    position: absolute; top: 60px; left: 0; right: 340px; bottom: 0;
  }

  /* ── Side Panel ── */
  .side-panel {
    position: fixed; top: 60px; right: 0; bottom: 0; width: 340px;
    background: var(--bg-secondary);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  .side-panel.collapsed { transform: translateX(340px); }

  .panel-placeholder {
    height: 100%; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--text-muted); text-align: center; padding: 40px;
  }
  .panel-placeholder-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
  .panel-placeholder-text { font-size: 14px; line-height: 1.6; }

  .node-detail { padding: 24px; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  .node-id {
    display: inline-block; padding: 3px 10px; border-radius: 6px;
    font-size: 12px; font-weight: 600; letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .node-name { font-size: 20px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.3px; }
  .node-module-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 16px; }

  .node-desc {
    font-size: 14px; line-height: 1.7; color: var(--text-secondary);
    margin-bottom: 20px; padding: 14px; border-radius: 10px;
    background: var(--bg-card); border: 1px solid var(--border);
  }

  .meta-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    margin-bottom: 20px;
  }
  .meta-item {
    padding: 12px; border-radius: 10px;
    background: var(--bg-card); border: 1px solid var(--border);
  }
  .meta-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .meta-value { font-size: 14px; font-weight: 600; }

  .tags-section { margin-bottom: 20px; }
  .tags-title { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .tags-list { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag {
    padding: 4px 12px; border-radius: 16px; font-size: 12px; font-weight: 500;
  }
  .tag-key-detail { background: rgba(239,68,68,0.15); color: #fca5a5; }
  .tag-diff-detail { background: rgba(245,158,11,0.15); color: #fcd34d; }
  .tag-exam-detail { background: rgba(59,130,246,0.15); color: #93c5fd; }
  .tag-sz-detail { background: rgba(16,185,129,0.15); color: #6ee7b7; }

  .relations-section { margin-bottom: 20px; }
  .relation-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 14px;
    border-radius: 8px; background: var(--bg-card); border: 1px solid var(--border);
    margin-bottom: 6px; cursor: pointer; transition: all 0.2s;
  }
  .relation-item:hover { border-color: var(--accent-blue); background: var(--bg-card-hover); }
  .relation-arrow { color: var(--text-muted); font-size: 14px; }
  .relation-label { font-size: 11px; color: var(--text-muted); }
  .relation-name { font-size: 13px; font-weight: 500; }

  .resource-section { margin-bottom: 20px; }
  .resource-link {
    display: block; padding: 10px 14px; border-radius: 8px;
    background: var(--bg-card); border: 1px solid var(--border);
    color: var(--accent-cyan); font-size: 13px; text-decoration: none;
    transition: all 0.2s;
  }
  .resource-link:hover { border-color: var(--accent-cyan); background: var(--bg-card-hover); }

  /* ── Stats Bar ── */
  .stats-bar {
    position: fixed; bottom: 0; left: 0; right: 340px;
    background: linear-gradient(0deg, rgba(10,14,26,0.95) 0%, rgba(10,14,26,0.7) 100%);
    backdrop-filter: blur(12px);
    padding: 10px 24px;
    display: flex; align-items: center; gap: 20px;
    border-top: 1px solid var(--border);
    font-size: 12px; color: var(--text-muted);
  }
  .stat-item { display:flex; align-items:center; gap:5px; }
  .stat-dot { width:8px; height:8px; border-radius:50%; }
  .stat-value { font-weight:600; color:var(--text-secondary); }

  /* ── Legend ── */
  .legend {
    position: fixed; bottom: 50px; left: 20px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 18px;
    font-size: 12px; z-index: 50;
  }
  .legend-title { font-weight: 600; margin-bottom: 8px; color: var(--text-secondary); }
  .legend-item { display:flex; align-items:center; gap:8px; margin-bottom: 4px; }
  .legend-dot { width:12px; height:12px; border-radius:50%; }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    #graph-container { right: 0; }
    .side-panel { width: 100%; top: auto; height: 50vh; border-left: none; border-top: 1px solid var(--border); }
    .stats-bar { right: 0; }
  }
</style>
</head>

  { from:'F1', to:'F2', label:'互补', type:'synergy' },
  { from:'F1', to:'F3', label:'高级策略', type:'advanced' },
  { from:'F3', to:'F4', label:'工具选择', type:'selection' },
  // G module internal
  { from:'G1', to:'G2', label:'深化', type:'deepening' },
  { from:'G3', to:'G2', label:'约束', type:'constraint' },
  { from:'G3', to:'G4', label:'合规底线', type:'compliance' },
  // Cross-module
  { from:'B5', to:'C1', label:'技术→应用', type:'cross' },
  { from:'C1', to:'D1', label:'核心技能', type:'cross' },
  { from:'D3', to:'E1', label:'信息处理', type:'cross' },
  { from:'E4', to:'G4', label:'伦理约束', type:'cross' },
  { from:'F3', to:'E4', label:'能力增强', type:'cross' },
];

// ════════════════════════════════════════
//  BUILD VIS.JS GRAPH
// ════════════════════════════════════════

function buildNodeSize(node) {
  let size = 22;
  if (node.tags.includes('key')) size += 5;
  if (node.tags.includes('diff')) size += 3;
  if (node.bloom >= 5) size += 4;
  return size;
}

function buildTagIcons(tags) {
  let icons = '';
  if (tags.includes('key')) icons += '🔴';
  if (tags.includes('diff')) icons += '🟡';
  if (tags.includes('exam')) icons += '🔵';
  if (tags.includes('sz')) icons += '🟢';
  return icons;
}

const visNodes = new vis.DataSet(knowledgeNodes.map(n => {
  const mc = MODULE_COLORS[n.module];
  return {
    id: n.id,
    label: `${n.id}\n${n.label}`,
    title: `${n.label} ${buildTagIcons(n.tags)}`,
    group: n.module,
    size: buildNodeSize(n),
    font: { color: '#e8ecf4', size: 12, face: 'Inter, Noto Sans SC, sans-serif', multi: true },
    color: {
      background: mc.bg,
      border: mc.border,
      highlight: { background: mc.highlight, border: '#fff' },
      hover: { background: mc.highlight, border: '#fff' }
    },
    borderWidth: 2,
    borderWidthSelected: 3,
    shadow: { enabled: true, color: mc.bg + '40', size: 15 },
    chosen: true,
    _data: n
  };
}));

const visEdges = new vis.DataSet(knowledgeEdges.map((e, i) => {
  const isCross = e.type === 'cross';
  return {
    id: i,
    from: e.from,
    to: e.to,
    label: e.label,
    arrows: { to: { enabled: true, scaleFactor: 0.6 } },
    color: {
      color: isCross ? '#4a5568' : '#3a4a6b',
      highlight: '#60a5fa',
      hover: '#60a5fa',
      opacity: isCross ? 0.4 : 0.6
    },
    dashes: isCross ? [8, 6] : false,
    width: isCross ? 1 : 1.5,
    font: { color: '#5c6a82', size: 10, strokeWidth: 3, strokeColor: '#0a0e1a', face: 'Inter, Noto Sans SC, sans-serif' },
    smooth: { type: 'curvedCW', roundness: 0.15 },
    _data: e
  };
}));

const container = document.getElementById('graph-container');
const network = new vis.Network(container, { nodes: visNodes, edges: visEdges }, {
  physics: {
    enabled: true,
    solver: 'forceAtlas2Based',
    forceAtlas2Based: {
      gravitationalConstant: -60,
      centralGravity: 0.008,
      springLength: 160,
      springConstant: 0.06,
      damping: 0.5
    },
    stabilization: { iterations: 200, fit: true }
  },
  interaction: {
    hover: true,
    tooltipDelay: 200,
    zoomView: true,
    dragView: true
  },
  layout: { improvedLayout: true },
  nodes: { shape: 'dot' },
  edges: { selectionWidth: 2 }
});

// ════════════════════════════════════════
//  DETAIL PANEL
// ════════════════════════════════════════

const TAG_NAMES = { key: '🔴 重点', diff: '🟡 难点', exam: '🔵 考点', sz: '🟢 思政' };
const TAG_CLASSES = { key: 'tag-key-detail', diff: 'tag-diff-detail', exam: 'tag-exam-detail', sz: 'tag-sz-detail' };

function showNodeDetail(nodeId) {
  const node = knowledgeNodes.find(n => n.id === nodeId);
  if (!node) return;
  const mc = MODULE_COLORS[node.module];

  // Find related edges
  const related = knowledgeEdges
    .filter(e => e.from === nodeId || e.to === nodeId)
    .map(e => {
      const targetId = e.from === nodeId ? e.to : e.from;
      const targetNode = knowledgeNodes.find(n => n.id === targetId);
      const direction = e.from === nodeId ? '→' : '←';
      return { id: targetId, name: targetNode.label, label: e.label, direction, type: e.type };
    });

  document.getElementById('panelPlaceholder').style.display = 'none';
  const detail = document.getElementById('nodeDetail');
  detail.style.display = 'block';

  detail.innerHTML = `
    <div class="node-id" style="background:${mc.bg}22; color:${mc.bg}">${node.id}</div>
    <div class="node-name">${node.label}</div>
    <div class="node-module-label">${mc.name} · ${mc.weeks}</div>
    <div class="node-desc">${node.desc}</div>
    <div class="meta-grid">
      <div class="meta-item">
        <div class="meta-label">Bloom层级</div>
        <div class="meta-value">${BLOOM_LABELS[node.bloom]}</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">教学周次</div>
        <div class="meta-value">${node.weeks}</div>
      </div>
    </div>
    ${node.tags.length ? `
    <div class="tags-section">
      <div class="tags-title">教学标签</div>
      <div class="tags-list">
        ${node.tags.map(t => `<span class="tag ${TAG_CLASSES[t]}">${TAG_NAMES[t]}</span>`).join('')}
      </div>
    </div>` : ''}
    ${related.length ? `
    <div class="relations-section">
      <div class="tags-title">关联知识点 (${related.length})</div>
      ${related.map(r => `
        <div class="relation-item" onclick="network.selectNodes(['${r.id}']); showNodeDetail('${r.id}')">
          <span class="relation-arrow">${r.direction}</span>
          <div>
            <div class="relation-name">${r.id} ${r.name}</div>
            <div class="relation-label">${r.label}${r.type === 'cross' ? ' (跨模块)' : ''}</div>
          </div>
        </div>
      `).join('')}
    </div>` : ''}
    <div class="resource-section">
      <div class="tags-title">关联资源</div>
      <div class="resource-link">${node.resource}</div>
    </div>
  `;
}

network.on('click', function(params) {
  if (params.nodes.length > 0) {
    showNodeDetail(params.nodes[0]);
  }
});

network.on('doubleClick', function(params) {
  if (params.nodes.length > 0) {
    network.focus(params.nodes[0], { scale: 1.5, animation: { duration: 600, easingFunction: 'easeInOutQuad' } });
  }
});

// ════════════════════════════════════════
//  MODULE FILTER
// ════════════════════════════════════════

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    const mod = this.dataset.module;
    applyFilters();
  });
});

document.querySelectorAll('.tag-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    this.classList.toggle('active');
    applyFilters();
  });
});

function applyFilters() {
  const activeMod = document.querySelector('.filter-btn.active').dataset.module;
  const activeTags = Array.from(document.querySelectorAll('.tag-btn.active')).map(b => b.dataset.tag);

  knowledgeNodes.forEach(n => {
    const modMatch = activeMod === 'all' || n.module === activeMod;
    const tagMatch = activeTags.length === 0 || n.tags.some(t => activeTags.includes(t));
    const visible = modMatch && tagMatch;

    visNodes.update({ id: n.id, hidden: !visible });
  });

  // Update stats
  const visibleNodes = knowledgeNodes.filter(n => {
    const modMatch = activeMod === 'all' || n.module === activeMod;
    const tagMatch = activeTags.length === 0 || n.tags.some(t => activeTags.includes(t));
    return modMatch && tagMatch;
  });
  document.getElementById('statNodes').textContent = visibleNodes.length;
}

// Fit after stabilization
network.on('stabilizationIterationsDone', function() {
  network.fit({ animation: { duration: 800, easingFunction: 'easeInOutQuad' } });
});
</script>
</body>
</html>
