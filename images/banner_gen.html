<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+SC:wght@400;600;800&display=swap');

  body {
    width: 1200px;
    height: 340px;
    overflow: hidden;
    font-family: 'Inter', 'Noto Sans SC', sans-serif;
    background: #0f0c29;
  }

  .banner {
    width: 1200px;
    height: 340px;
    background: linear-gradient(135deg, #0f0c29 0%, #302b63 40%, #24243e 100%);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    padding: 0 80px;
  }

  /* Animated grid background */
  .banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* Glow orbs */
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.4;
  }
  .orb-1 { width: 300px; height: 300px; background: #6c63ff; top: -100px; left: 100px; }
  .orb-2 { width: 250px; height: 250px; background: #00d2ff; top: 50px; right: 200px; }
  .orb-3 { width: 200px; height: 200px; background: #ff6b9d; bottom: -80px; left: 400px; opacity: 0.3; }
  .orb-4 { width: 180px; height: 180px; background: #ffd93d; bottom: -60px; right: 80px; opacity: 0.25; }

  .content {
    position: relative;
    z-index: 10;
    color: white;
    flex: 1;
  }

  .badge {
    display: inline-block;
    background: rgba(108, 99, 255, 0.3);
    border: 1px solid rgba(108, 99, 255, 0.5);
    color: #b8b3ff;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 20px;
    margin-bottom: 16px;
  }

  .title-cn {
    font-size: 32px;
    font-weight: 800;
    line-height: 1.3;
    background: linear-gradient(90deg, #ffffff 0%, #e0d4ff 50%, #b8b3ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
  }

  .title-en {
    font-size: 14px;
    font-weight: 400;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.5px;
    margin-bottom: 20px;
  }

  .tags {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.75);
    font-size: 13px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 8px;
    backdrop-filter: blur(10px);
  }

  .tag .icon { font-size: 15px; }

  /* Right side: pipeline graphic */
  .pipeline {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-left: 60px;
  }

  .pipe-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .node {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    position: relative;
    flex-shrink: 0;
  }

  .node-glow {
    position: absolute;
    inset: -4px;
    border-radius: 18px;
    opacity: 0.3;
    filter: blur(8px);
  }

  .n1 { background: rgba(255,183,77,0.2); border: 1px solid rgba(255,183,77,0.4); }
  .n1 .node-glow { background: #ffb74d; }
  .n2 { background: rgba(0,210,255,0.2); border: 1px solid rgba(0,210,255,0.4); }
  .n2 .node-glow { background: #00d2ff; }
  .n3 { background: rgba(76,175,80,0.2); border: 1px solid rgba(76,175,80,0.4); }
  .n3 .node-glow { background: #4caf50; }
  .n4 { background: rgba(108,99,255,0.2); border: 1px solid rgba(108,99,255,0.4); }
  .n4 .node-glow { background: #6c63ff; }
  .n5 { background: rgba(255,107,157,0.2); border: 1px solid rgba(255,107,157,0.4); }
  .n5 .node-glow { background: #ff6b9d; }
  .n6 { background: rgba(255,217,61,0.2); border: 1px solid rgba(255,217,61,0.4); }
  .n6 .node-glow { background: #ffd93d; }

  .connector {
    width: 20px;
    height: 2px;
    background: linear-gradient(90deg, rgba(255,255,255,0.15), rgba(255,255,255,0.3), rgba(255,255,255,0.15));
    border-radius: 1px;
  }

  .node-label {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    font-weight: 500;
    white-space: nowrap;
  }

  /* Decorative floating particles */
  .particle {
    position: absolute;
    width: 3px;
    height: 3px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
  }
  .p1 { top: 30px; left: 300px; }
  .p2 { top: 80px; right: 150px; }
  .p3 { bottom: 60px; left: 200px; }
  .p4 { top: 120px; left: 500px; }
  .p5 { bottom: 40px; right: 300px; }
  .p6 { top: 50px; right: 400px; width: 2px; height: 2px; }
  .p7 { bottom: 90px; left: 600px; width: 4px; height: 4px; opacity: 0.15; }

  /* Corner accent */
  .corner-accent {
    position: absolute;
    top: 0;
    right: 0;
    width: 200px;
    height: 200px;
    background: linear-gradient(225deg, rgba(108,99,255,0.1) 0%, transparent 70%);
  }
</style>
</head>
<body>
<div class="banner">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>
  <div class="corner-accent"></div>

  <div class="particle p1"></div>
  <div class="particle p2"></div>
  <div class="particle p3"></div>
  <div class="particle p4"></div>
  <div class="particle p5"></div>
  <div class="particle p6"></div>
  <div class="particle p7"></div>

  <div class="content">
    <div class="badge">🎓 汕头大学智慧课程</div>
    <div class="title-cn">内容生产新方法——AI与传播实践</div>
    <div class="title-en">Content Production New Methods — AI and Communication Practice</div>
    <div class="tags">
      <span class="tag"><span class="icon">💡</span> 选题策划</span>
      <span class="tag"><span class="icon">🔍</span> 智能检索</span>
      <span class="tag"><span class="icon">✅</span> 事实核查</span>
      <span class="tag"><span class="icon">✍️</span> AI写作</span>
      <span class="tag"><span class="icon">⚖️</span> 伦理判断</span>
      <span class="tag"><span class="icon">🚀</span> 全案实战</span>
    </div>
  </div>

  <div class="pipeline">
    <div class="pipe-row">
      <div class="node n1"><div class="node-glow"></div>💡</div>
      <div class="connector"></div>
      <div class="node n2"><div class="node-glow"></div>🔎</div>
      <div class="connector"></div>
      <div class="node n3"><div class="node-glow"></div>✅</div>
    </div>
    <div style="display:flex; justify-content:center;">
      <div style="width:2px; height:12px; background:rgba(255,255,255,0.15); border-radius:1px;"></div>
    </div>
    <div class="pipe-row">
      <div class="node n4"><div class="node-glow"></div>📝</div>
      <div class="connector"></div>
      <div class="node n5"><div class="node-glow"></div>✍️</div>
      <div class="connector"></div>
      <div class="node n6"><div class="node-glow"></div>📡</div>
    </div>
  </div>
</div>
</body>
</html>
